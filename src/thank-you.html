<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You — Rob Marston</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --terracotta: #c0633a;
      --ink: #1a1612;
      --parchment: #f7f3ee;
      --white: #fdfaf7;
      --serif: 'DM Serif Display', Georgia, serif;
      --mono: 'DM Mono', 'Courier New', monospace;
      --sans: 'DM Sans', system-ui, sans-serif;
      --track-wider: 0.14em;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--white);
      color: var(--ink);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }

    .container {
      max-width: 600px;
    }

    h1 {
      font-family: var(--serif);
      font-size: clamp(2.5rem, 5vw, 4rem);
      line-height: 1.1;
      color: var(--ink);
      margin-bottom: 1.5rem;
    }

    p {
      font-family: var(--sans);
      font-size: 1.1rem;
      font-weight: 300;
      color: var(--ink-soft);
      margin-bottom: 3rem;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: var(--track-wider);
      text-transform: uppercase;
      color: var(--terracotta);
      text-decoration: none;
      border-bottom: 1px solid var(--terracotta);
      padding-bottom: 0.2rem;
      transition: gap 0.2s;
    }

    .back-link:hover { gap: 1.25rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Message received.</h1>
    <p>Thank you for reaching out. I'll review your inquiry and get back to you shortly.</p>
    <a href="/" class="back-link">&larr; Return home</a>
  </div>
</body>
</html>
