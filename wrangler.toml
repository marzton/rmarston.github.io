name = "rmarston-github-io"
main = "worker/index.ts"
compatibility_date = "2026-03-22"

# Deployment model for this repository:
# - rmarston.com is served directly by GitHub Pages (see CNAME at repo root).
# - This worker is intentionally NOT attached to rmarston.com.
# - Keep routes empty and manage DNS/page routing in Cloudflare + GitHub Pages only.
# - If any legacy route exists in Cloudflare dashboard, remove it to avoid shadowing.
routes = []

[vars]
CONTACT_FROM_EMAIL = "contact@rmarston.com"
CONTACT_TO_EMAIL = "marstonr6@gmail.com"

# Cloudflare Email Routing — send_email binding
# Requires Email Routing to be enabled on the rmarston.com zone and the
# destination address to be verified in the Cloudflare dashboard.
[[send_email]]
name = "SEND_EMAIL"
destination_address = "marstonr6@gmail.com"
