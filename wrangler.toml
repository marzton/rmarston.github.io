name = "rmarston-github-io"
main = "worker/index.ts"
compatibility_date = "2026-03-22"

# Routes are intentionally empty.
# rmarston.com is served directly by GitHub Pages via the CNAME file.
# Redeploy this worker (wrangler deploy) after removing the old route from
# the Cloudflare dashboard under Workers & Pages > rmarston-github-io > Triggers.
routes = []

[vars]
PRIMARY_DOMAIN = "rmarston.com"
REDIRECT_MODE = "301"
# BACKEND_UPSTREAM intentionally omitted: this worker only handles
# canonical redirects and /api/contact email delivery.
CONTACT_FROM_EMAIL = "contact@goldshore.ai"
CONTACT_TO_EMAIL = "rob@goldshore.ai"

# Cloudflare Email Routing — send_email binding
# Requires Email Routing to be enabled on the goldshore.ai zone and the
# destination address to be verified in the Cloudflare dashboard.
[[send_email]]
name = "SEND_EMAIL"
destination_address = "rob@goldshore.ai"
