name = "rmarston-com"
main = "worker/index.ts"
compatibility_date = "2025-03-07"
compatibility_flags = ["nodejs_compat"]

# Serves rmarston.com directly via Worker + static assets
# Worker handles /api/contact, assets serve dist/
assets = { directory = "./dist", not_found_handling = "single-page-application", binding = "ASSETS" }

[vars]
ENV = "production"
PRIMARY_DOMAIN = "rmarston.com"
CONTACT_FROM_EMAIL = "hello@rmarston.com"
CONTACT_TO_EMAIL = "marstonr6@gmail.com"

# Secrets (set via wrangler secret put):
#   WEBHOOK_SECRET

[[send_email]]
name = "SEND_EMAIL"
destination_address = "marstonr6@gmail.com"

[[d1_databases]]
binding = "AUDIT_DB"
database_name = "gs_audit_db"
database_id = "1ae71d76-188f-481b-91d9-db2d39013f68"

# Routes — attach worker to required subdomains
[[routes]]
pattern = "api.rmarston.com/*"
zone_name = "rmarston.com"

[[routes]]
pattern = "admin.rmarston.com/*"
zone_name = "rmarston.com"

[[routes]]
pattern = "preview.rmarston.com/*"
zone_name = "rmarston.com"
