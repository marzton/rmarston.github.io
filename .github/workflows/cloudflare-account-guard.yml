name: Cloudflare Account Guard

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-account-resources:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - run: test -f ops/cloudflare-account-required.json && test -f ops/cloudflare-deploy-targets.json
      - name: Require account secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing CLOUDFLARE_API_TOKEN" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing CLOUDFLARE_ACCOUNT_ID" && exit 1)
      - name: Validate deploy target manifest
        run: |
          python - <<'PY'
          import json
          cfg = json.load(open('ops/cloudflare-deploy-targets.json'))
          assert cfg['repo'] == 'rmarston.github.io'
          assert cfg['production']['worker_url'].startswith('https://')
          assert cfg['preview']['worker_url'].startswith('https://')
          print('Deploy target manifest passed.')
          PY
