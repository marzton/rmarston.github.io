name: Cloudflare Infra Guard

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-cloudflare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Ensure requirements manifest exists
        run: test -f ops/cloudflare-required.json

      - name: Verify Cloudflare secrets are present
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing CLOUDFLARE_API_TOKEN" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing CLOUDFLARE_ACCOUNT_ID" && exit 1)

      - name: Validate routes, DNS, and KV namespaces
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          python - <<'PY'
          import json, os, sys, urllib.request

          def cf_get(url):
              req = urllib.request.Request(url, headers={
                  'Authorization': f"Bearer {os.environ['CLOUDFLARE_API_TOKEN']}",
                  'Content-Type': 'application/json',
              })
              with urllib.request.urlopen(req) as resp:
                  data = json.loads(resp.read().decode())
              if not data.get('success'):
                  raise SystemExit(f"Cloudflare API error for {url}: {data}")
              return data['result']

          with open('ops/cloudflare-required.json', 'r', encoding='utf-8') as f:
              cfg = json.load(f)

          zone_name = cfg['zone_name']
          zones = cf_get(f'https://api.cloudflare.com/client/v4/zones?name={zone_name}')
          if not zones:
              raise SystemExit(f'Zone not found: {zone_name}')
          zone_id = zones[0]['id']

          route_result = cf_get(f'https://api.cloudflare.com/client/v4/zones/{zone_id}/workers/routes')
          route_patterns = [r.get('pattern') for r in route_result]

          for pattern in cfg.get('required_routes', []):
              if pattern not in route_patterns:
                  raise SystemExit(f'Missing required worker route: {pattern}')

          for pattern in cfg.get('forbidden_routes', []):
              if pattern in route_patterns:
                  raise SystemExit(f'Forbidden worker route still present: {pattern}')

          for hostname in cfg.get('required_dns', []):
              records = cf_get(f'https://api.cloudflare.com/client/v4/zones/{zone_id}/dns_records?name={hostname}')
              if not records:
                  raise SystemExit(f'Missing required DNS record: {hostname}')

          kv_result = cf_get(f'https://api.cloudflare.com/client/v4/accounts/{os.environ["CLOUDFLARE_ACCOUNT_ID"]}/storage/kv/namespaces')
          kv_titles = {ns.get('title') for ns in kv_result}
          for namespace in cfg.get('required_kv_namespaces', []):
              if namespace not in kv_titles:
                  raise SystemExit(f'Missing required KV namespace: {namespace}')

          print('Cloudflare infra guard passed.')
          PY
