<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solefood NY — R. Marston Registry</title>
  <meta name="description" content="Solefood NY (#SFNY): Sneaker boutique brand identity by R. Marston." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --void: #080a0d; --green: #00e5a0; --steel: #4a6075; --white: #e8eaed; }
    html, body { background: var(--void); color: var(--white); min-height: 100vh; font-family: 'IBM Plex Mono', monospace; }
    .page { max-width: 780px; margin: 0 auto; padding: 4rem 2rem 6rem; }
    .back-btn {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      color: var(--green);
      text-decoration: none;
      border: 1px solid var(--green);
      padding: 0.4rem 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: var(--void);
    }
    .back-btn:hover { background: var(--green); color: var(--void); }
    .label { font-size: 0.75rem; letter-spacing: 0.25em; color: var(--steel); text-transform: uppercase; margin-bottom: 0.75rem; }
    h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(2rem, 6vw, 4rem); line-height: 1; color: var(--white); letter-spacing: -0.02em; margin-bottom: 2rem; }
    h1 span { color: var(--green); }
    .placeholder { border: 1px solid var(--steel); padding: 2rem; color: var(--steel); font-size: 0.85rem; line-height: 1.8; }
  </style>
</head>
<body>
  <a class="back-btn" href="../">&#8592; Registry</a>
  <div class="page">
    <p class="label">// solefood ny &mdash; #sfny boutique</p>
    <h1>SOLE<span>FOOD</span></h1>
    <div class="placeholder">
      <p>// BRAND IDENTITY &mdash; PLACEHOLDER</p>
      <p>// #SFNY &mdash; Sneaker Boutique</p>
      <p>// Product grid &amp; brand assets coming soon.</p>
    </div>
  </div>
</body>
</html>
